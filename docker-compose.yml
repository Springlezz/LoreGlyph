services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - loreglyph-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  loreglyph:
    build:
      context: ./LoreGlyph/
      dockerfile: Dockerfile
    ports:
      - "5248:8080"
      - "8081:8081"
    environment:
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING}
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER:-LoreGlyph}
      - Jwt__Audience=${JWT_AUDIENCE:-LoreGlyphUsers}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - loreglyph-network

  frontend:
    build:
      context: ./LoreGlyph/Frontend
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    environment:
      - VUE_APP_API_URL=http://loreglyph:8080/api
    depends_on:
      - loreglyph
    networks:
      - loreglyph-network

networks:
  loreglyph-network:
    driver: bridge

volumes:
  postgres_data: